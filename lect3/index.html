<body>
    <script>
        //hoisting
        // console.log(a);
        // var a = 10;             //undefined

        //using let keyword
        // console.log(b);        //ReferenceError: Cannot access 'b' before initialization
        // let b = 20;

        //using arrow function
        // sum();
        // var sum = () => {      //sum is not a function
        //     console.log("Hello");
        // }

        // sum1();
        // let sum1 = () => {      // ReferenceError: Cannot access 'sum1' before initialization
        //     console.log("Hello");
        // }

        //methods of array
        let arr =[1,2,3,4,5];
        console.log(arr.length);
        arr.push(6);    //adds an element at the end of the array
        arr.pop();      //removes the last element of the array
        arr.unshift(6);   //adds an element at the beginning of the array
        arr.shift();      //removes the first element of the array
        console.log(arr.includes(3, "kyaaaa"));   // gives true if the element is present in the array, otherwise false
        arr.indexOf(3);    //gives the index of the element in the array, if the element is not present in the array, it gives -1
        let data = arr.find((element) => element > 3);   //gives the first element that satisfies the condition, if no element satisfies the condition, it gives undefined
        console.log(data);

        //forEach method
        arr.forEach((a,b,c) => {
            console.log(a,b,c, "forEach");  //a is the element, b is the index, c is the array
            //return a
        });

    
        //map method
        let arr1 = arr.map((a,b,c) => {  //a is the element, b is the index, c is the array
            return a*2;   //gives a new array with the elements that satisfy the condition
        });
        console.log(arr1);

        //differnce between forEach and map is that forEach does not return anything, it just executes the function for each element of the array, whereas map returns a new array with the elements that satisfy the condition.

        // filter method  same  as map
        let arr2 = arr.filter((a,b,c) => {  //a is the element, b is the index, c is the array
            return a > 3;   //gives a new array with the elements that satisfy the condition
        });
        console.log(arr2);

        //reduce method
        let sum = arr.reduce((a,b,c,d) => { 
            console.log(a, "mai a hu")
            console.log(b, "mai b hu")
            return a+b;   //gives a single value that is the result of the reduction of the array

          },10)  //acc is the accumulator
        console.log(sum);
        
        //Ques
        let arr3=[1,2,3,5,53,6,3,6,3,345,2];
        let arr4=arr3.filter((a) =>{
            return a>2;
        })
        let arr5 = arr4.filter((a)=>{
            return a%2==0;
        })
        let sum2= arr5.reduce((a,b) =>{
            return a+b;
        },0)
        console.log(sum2);
    </script>
